<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!DOCTYPE html>
<html>
<head>
    <title>Statistics Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        .round-calendar {
    display: grid;
    grid-template-columns: repeat(31, 1fr); /* Always shows 31 spaces */
    gap: 8px;
    padding: 20px;
    background: white;
    border-radius: 12px;
    box-shadow: 0 0 15px rgba(0,0,0,0.1);
}
.chart-container {
    width: 100%;
    height: 25vh;      /* 1/4 of screen height */
    max-height: 300px; /* Optional cap */
    margin: auto;
}

.day-circle {
    width: 100%;
    aspect-ratio: 1 / 1;       /* Keeps the circle shape */
    background: #dfe6e9;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: 600;
    color: #2d3436;
    border: 2px solid #b2bec3;
    font-size: 14px;
}

.weekday-row {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    text-align: center;
    font-weight: 600;
    margin-bottom: 10px;
    color: #2d3436;
}

.active-day {
    background: #2ecc71 !important;
    border-color: #27ae60 !important;
    color: white !important;
}


    </style>
</head>
<body>

    <h6 class="text-center mt-4 mb-4">Statistics Dashboard</h6>
    <a href="/" class="btn btn-success" style="margin-left:20px; margin-top:0px;">
    Back to Home
</a>



    <!-- CALENDAR -->
    <div class="calendar-container">
    <h4 style="text-align:center;">Record Activity Calendar ({{ current_month_name }} {{ current_year }})</h4>

    <div class="round-calendar">
        {% for day in current_month_days %}
            {% if day in active_days %}
                <div class="day-circle active-day">{{ day }}</div>
            {% else %}
                <div class="day-circle">{{ day }}</div>
            {% endif %}
        {% endfor %}
    </div>

    <!-- TOTAL DOSE CHART -->
    <div class="chart-box">
        <h3 style="text-align:center;">Total Dose Per Person</h3>
        <canvas id="doseChart" height="50" width="150"></canvas>
    </div>

    
</div>


    <!-- ----------------------------- -->
    <!-- CHART.JS SCRIPT BELOW        -->
    <!-- ----------------------------- -->

    <script>
        const labels = {{ labels | tojson }};
        const doseValues = {{ values | tojson }};

        const ctx = document.getElementById('doseChart').getContext('2d');

        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Total Dose (µSv)',
                    data: doseValues,
                    backgroundColor: 'rgba(54, 162, 235, 0.7)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 2,
                    borderRadius: 6
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: { beginAtZero: true }
                }
            }
        });
    </script>

</body>
</html>
